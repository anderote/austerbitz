<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Austerblitz — Soldier Component Preview</title>
    <style>
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: #f6f3ec;
        color: #1f1d1a;
      }
      h2 {
        margin: 0 0 6px;
        font-size: 11px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: #6b6452;
        font-weight: 600;
      }
      main {
        display: grid;
        grid-template-rows: auto 1fr auto auto;
        min-height: 100vh;
        padding: 12px;
        gap: 12px;
      }

      .labeled-panel {
        background: #ffffff;
        border: 1px solid #d8d3c5;
        border-radius: 6px;
        padding: 10px 12px;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      /* --- TOP ROW --- */
      .top-row {
        display: grid;
        grid-template-columns: auto 1fr;
        gap: 12px;
        align-items: stretch;
      }
      .unit-thumb {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 4px;
        padding: 8px;
        background: #ffffff;
        border: 1px solid #d8d3c5;
        border-radius: 6px;
        cursor: pointer;
        color: inherit;
      }
      .unit-thumb:hover { border-color: #7a8eb5; }
      .unit-thumb canvas {
        width: 96px;
        height: 108px;
        image-rendering: pixelated;
        background: #cbd5e1;
        border-radius: 4px;
      }
      .unit-thumb-label {
        font-size: 11px;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        color: #6b6452;
      }
      .pose-strip {
        display: flex;
        gap: 8px;
        overflow-x: auto;
      }
      .pose-strip-cell {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 4px;
        padding: 6px 8px;
        background: #f0ece1;
        border: 2px solid #d8d3c5;
        border-radius: 4px;
        cursor: pointer;
        color: inherit;
      }
      .pose-strip-cell:hover { border-color: #7a8eb5; }
      .pose-strip-cell.active { border-color: #2563eb; box-shadow: 0 0 0 1px #2563eb; }
      .pose-strip-cell canvas {
        width: 64px;
        height: 72px;
        image-rendering: pixelated;
        background: #cbd5e1;
        border-radius: 2px;
      }
      .pose-strip-cell .pose-label {
        font-size: 10px;
        font-family: ui-monospace, Menlo, monospace;
        color: #3f3a31;
      }

      /* --- TOP ROW: weapon source panel --- */
      .weapon-source-panel { min-width: 180px; }
      #weapon-source-grid {
        display: grid;
        grid-template-columns: repeat(3, 80px);
        grid-template-rows: repeat(3, 90px);
        gap: 4px;
      }
      .weapon-source-cell {
        position: relative; width: 80px; height: 90px; padding: 0;
        background: #cbd5e1; border: 2px solid #d8d3c5;
        border-radius: 4px; cursor: pointer; overflow: hidden;
      }
      .weapon-source-cell:hover { border-color: #7a8eb5; }
      .weapon-source-cell.active { border-color: #16a34a; box-shadow: 0 0 0 1px #16a34a; }
      .weapon-source-cell.disabled { opacity: 0.35; cursor: not-allowed; }
      .weapon-source-cell canvas {
        position: absolute; inset: 0; width: 100%; height: 100%;
        image-rendering: pixelated; pointer-events: none;
      }
      .weapon-source-cell .label {
        position: absolute; top: 1px; left: 2px;
        font-size: 8px; font-family: ui-monospace, Menlo, monospace;
        color: #1f1d1a; background: rgba(255, 255, 255, 0.75);
        padding: 0 2px; border-radius: 2px; pointer-events: none;
      }
      .weapon-source-cell-empty { width: 80px; height: 90px; }

      /* --- POPOVER --- */
      .popover-backdrop {
        position: fixed; inset: 0;
        background: rgba(31, 29, 26, 0.32);
        display: flex; align-items: center; justify-content: center; z-index: 50;
      }
      .popover-backdrop[hidden] { display: none; }
      .unit-picker {
        background: #ffffff; border: 1px solid #d8d3c5; border-radius: 6px;
        padding: 16px; max-width: 80vw; max-height: 80vh; overflow: auto;
      }
      .unit-picker h2 { color: #6b6452; }
      .unit-picker-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
        gap: 12px;
      }
      .unit-picker-cell {
        display: flex; flex-direction: column; align-items: center; gap: 4px;
        padding: 8px; background: #f0ece1; border: 2px solid #d8d3c5;
        border-radius: 4px; cursor: pointer; color: inherit;
      }
      .unit-picker-cell:hover { border-color: #7a8eb5; }
      .unit-picker-cell.active { border-color: #2563eb; }
      .unit-picker-cell canvas {
        width: 96px; height: 108px;
        image-rendering: pixelated; background: #cbd5e1; border-radius: 2px;
      }
      .unit-picker-cell .unit-label {
        font-size: 11px; font-family: ui-monospace, Menlo, monospace; color: #3f3a31;
      }

      /* --- MIDDLE ROW --- */
      .middle-row {
        display: grid;
        grid-template-columns: 1fr auto 240px;
        gap: 12px;
        align-items: start;
      }
      .editing-grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 12px;
        align-items: start;
      }
      .combined-panel { padding: 10px 12px; }
      .combined-row {
        display: flex;
        flex-direction: row;
        gap: 12px;
        align-items: flex-start;
      }
      .combined-preview-wrap {
        display: flex;
        flex-direction: column;
        gap: 4px;
        align-items: center;
        flex: 1 1 0;
        min-width: 0;
      }
      .combined-preview-label {
        font-size: 10px;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        color: #978f7c;
      }
      .preview-wrap {
        position: relative;
        background: #cbd5e1;
        border-radius: 4px;
        padding: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: crosshair;
        overflow: hidden;
      }
      .pixel-hover {
        position: absolute;
        top: 0;
        left: 0;
        pointer-events: none;
        box-sizing: border-box;
        border: 1px solid rgba(220, 38, 38, 0.95);
        box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.6) inset;
        /* width / height / transform set inline by JS */
      }
      .pixel-hover[hidden] { display: none; }
      .preview-wrap.small {
        width: auto;
        height: 278px;
      }
      .preview-wrap.composite {
        width: 320px;
        height: 360px;
        cursor: default;
      }
      #facing-preview-canvas {
        height: 100%;
        width: auto;
        aspect-ratio: 32 / 36;
        image-rendering: pixelated;
        background: transparent;
        display: block;
      }
      #weapon-source-preview-canvas {
        height: 100%;
        width: auto;
        aspect-ratio: 1 / 1;
        image-rendering: pixelated;
        background: transparent;
        display: block;
      }
      #composite-preview-canvas {
        width: 320px;
        height: 360px;
        image-rendering: pixelated;
        background: transparent;
        display: block;
      }
      .composite-column {
        align-self: start;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .save-variant-button {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 8px 12px;
        background: #16a34a;
        border: 1px solid #15803d;
        color: #ffffff;
        border-radius: 4px;
        cursor: pointer;
        font-size: 13px;
        font-weight: 600;
        letter-spacing: 0.04em;
      }
      .save-variant-button:hover { background: #15803d; }
      .save-variant-button:disabled { opacity: 0.45; cursor: not-allowed; }
      .save-variant-button .hotkey-hint {
        font-family: ui-monospace, Menlo, monospace;
        font-size: 10px;
        font-weight: 500;
        padding: 2px 6px;
        background: rgba(255, 255, 255, 0.18);
        border: 1px solid rgba(255, 255, 255, 0.3);
        border-radius: 3px;
        letter-spacing: 0;
      }
      .paint-layer-list {
        display: flex;
        flex-direction: column;
        gap: 2px;
        max-height: 220px;
        overflow-y: auto;
        background: #f6f3ec;
        border: 1px solid #d8d3c5;
        border-radius: 4px;
        padding: 4px;
      }
      .paint-layer-item {
        display: flex;
        align-items: center;
        padding: 5px 8px;
        background: transparent;
        border: 1px solid transparent;
        border-radius: 3px;
        cursor: pointer;
        font-family: ui-monospace, Menlo, monospace;
        font-size: 11px;
        color: #3f3a31;
        text-align: left;
      }
      .paint-layer-item:hover { background: #ece7d8; }
      .paint-layer-item.active {
        background: #e0e9f7;
        border-color: #2563eb;
        color: #1f1d1a;
      }
      .paint-layer-item.is-weapon::after {
        content: '⚔';
        margin-left: auto;
        color: #6b6452;
        font-size: 11px;
      }
      .paint-layer-item.active.is-weapon::after { color: #2563eb; }
      .paint-tools-panel {
        background: #ffffff;
        border: 1px solid #d8d3c5;
        border-radius: 6px;
        padding: 12px;
        display: flex;
        flex-direction: column;
        gap: 12px;
        font-size: 12px;
      }
      .palette-rows {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .palette-row {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }
      .palette-row-label {
        font-size: 10px;
        color: #6b6452;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }
      .palette-row-label em {
        font-style: normal;
        color: #978f7c;
        text-transform: none;
        letter-spacing: 0;
        margin-left: 4px;
      }
      .palette-row-swatches {
        display: flex;
        gap: 4px;
        flex-wrap: wrap;
      }
      .palette-swatch {
        width: 28px; height: 28px;
        border: 2px solid #d8d3c5;
        border-radius: 4px;
        cursor: pointer;
        padding: 0;
      }
      .palette-swatch:hover { border-color: #7a8eb5; }
      .palette-swatch.active { border-color: #2563eb; box-shadow: 0 0 0 1px #2563eb; }
      .palette-materials-heading {
        margin: 8px 0 6px;
      }
      .paint-color-row, .paint-layer-row {
        display: flex; flex-direction: column; gap: 4px; font-size: 11px; color: #6b6452;
      }
      .paint-mode-row { display: flex; gap: 12px; font-size: 12px; }
      .paint-mode-row label { display: flex; align-items: center; gap: 6px; cursor: pointer; }
      .paint-tools-panel select, .paint-tools-panel input[type="color"] {
        background: #ffffff;
        border: 1px solid #d8d3c5;
        color: inherit;
        padding: 4px;
        border-radius: 4px;
      }
      .paint-tools-panel button {
        padding: 6px 8px;
        background: #16a34a;
        border: 1px solid #15803d;
        color: #ffffff;
        border-radius: 4px;
        cursor: pointer;
        font-size: 12px;
      }
      .paint-tools-panel button:hover { background: #15803d; }

      .facing-picker-panel { min-width: 0; }
      .facing-grid {
        display: grid;
        grid-template-columns: repeat(3, 96px);
        grid-template-rows: repeat(3, 108px);
        gap: 6px;
      }
      .facing-grid.small {
        grid-template-columns: repeat(3, 80px);
        grid-template-rows: repeat(3, 90px);
        gap: 4px;
      }
      .facing-cell {
        position: relative;
        width: 96px; height: 108px;
        padding: 0;
        background: #cbd5e1;
        border: 2px solid #d8d3c5;
        border-radius: 4px;
        cursor: pointer;
        overflow: hidden;
      }
      .facing-grid.small .facing-cell {
        width: 80px; height: 90px;
      }
      .facing-cell:hover { border-color: #7a8eb5; }
      .facing-cell.active { border-color: #2563eb; box-shadow: 0 0 0 1px #2563eb; }
      .facing-cell canvas {
        position: absolute; inset: 0; width: 100%; height: 100%;
        image-rendering: pixelated; pointer-events: none;
      }
      .facing-cell .label {
        position: absolute; top: 2px; left: 3px;
        font-size: 9px; font-family: ui-monospace, Menlo, monospace;
        color: #1f1d1a; background: rgba(255, 255, 255, 0.75);
        padding: 0 3px; border-radius: 2px; pointer-events: none;
      }
      .facing-grid.small .facing-cell .label { font-size: 8px; padding: 0 2px; }
      .facing-cell-empty { width: 96px; height: 108px; }
      .facing-grid.small .facing-cell-empty { width: 80px; height: 90px; }

      /* --- BOTTOM --- */
      .bottom-row {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 12px;
        align-items: stretch;
      }
      .variants-strip {
        display: flex;
        gap: 8px;
        overflow-x: auto;
      }
      .variant-cell {
        position: relative;
        display: flex; flex-direction: column; align-items: center; gap: 4px;
        padding: 6px;
        background: #f0ece1;
        border: 2px solid #d8d3c5;
        border-radius: 4px;
        cursor: pointer;
        color: inherit;
      }
      .variant-cell:hover { border-color: #7a8eb5; }
      .variant-cell.active { border-color: #2563eb; box-shadow: 0 0 0 1px #2563eb; }
      .variant-cell canvas {
        width: 64px; height: 72px;
        image-rendering: pixelated; background: #cbd5e1; border-radius: 2px;
      }
      .variant-cell .variant-idx {
        font-size: 10px; font-family: ui-monospace, Menlo, monospace; color: #6b6452;
      }
      .variant-cell.add-new {
        border-style: dashed;
        font-size: 24px;
        color: #978f7c;
        align-items: center;
        justify-content: center;
        min-width: 76px;
      }

      .weapon-edit-panel {
        background: #ffffff;
        border: 1px solid #d8d3c5;
        border-radius: 6px;
        padding: 10px 12px;
        display: flex;
        flex-direction: column;
        gap: 8px;
        font-size: 12px;
      }
      .weapon-edit-panel.disabled { opacity: 0.55; }
      .weapon-edit-row {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      #weapon-edit-thumb {
        width: 40px; height: 40px;
        background: #cbd5e1;
        border: 1px solid #d8d3c5;
        border-radius: 4px;
        image-rendering: pixelated;
        flex-shrink: 0;
      }
      #weapon-edit-stats {
        font-family: ui-monospace, Menlo, monospace;
        font-size: 11px; color: #3f3a31; line-height: 1.5;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 0 10px;
      }
      #weapon-edit-stats .stat-key { color: #978f7c; }
      #weapon-edit-strip .button-row {
        display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px;
      }
      #weapon-edit-strip button {
        padding: 6px 8px;
        background: #f0ece1;
        border: 1px solid #b8b1a0;
        color: inherit;
        border-radius: 4px;
        cursor: pointer;
        font-size: 12px;
      }
      #weapon-edit-strip button:hover { background: #e6e0d0; }
      #weapon-edit-strip button:disabled { opacity: 0.45; cursor: not-allowed; }
      #weapon-edit-strip button.primary {
        background: #16a34a;
        border-color: #15803d;
        color: #ffffff;
      }
      #weapon-edit-strip button.primary:hover { background: #15803d; }
      #weapon-edit-help { font-size: 10px; color: #978f7c; line-height: 1.4; }

      .info-card {
        padding: 8px 12px;
        background: #ffffff;
        border: 1px solid #b8c4dc;
        border-radius: 4px;
        font-size: 11px;
        font-family: ui-monospace, Menlo, monospace;
        line-height: 1.4;
        color: #3f3a31;
      }
      .info-card strong { color: #2563eb; font-weight: 600; }

      .advanced-drawer {
        background: #ffffff;
        border: 1px solid #d8d3c5;
        border-radius: 6px;
        padding: 8px 12px;
      }
      .advanced-drawer summary {
        cursor: pointer; font-size: 11px;
        letter-spacing: 0.08em; text-transform: uppercase;
        color: #6b6452;
      }
      .advanced-body {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
        gap: 8px;
        padding-top: 12px;
      }
      .advanced-body label {
        display: flex; flex-direction: column; gap: 4px;
        font-size: 11px; color: #6b6452;
      }
      .advanced-body select, .advanced-body button {
        padding: 6px 8px;
        border: 1px solid #d8d3c5;
        border-radius: 4px;
        background: #ffffff;
        color: inherit;
        font-size: 12px;
      }
      .advanced-body button.reset {
        background: #f0ece1;
        border-color: #b8b1a0;
        cursor: pointer;
      }
      #component-groups { grid-column: 1 / -1; max-height: 300px; overflow-y: auto; font-size: 12px; }
      #component-groups label { display: flex; gap: 6px; align-items: center; padding: 2px 0; cursor: pointer; }
      #component-groups h2 { margin: 8px 0 4px; }

      #toast {
        position: fixed; bottom: 16px; right: 16px;
        padding: 10px 14px;
        background: #ffffff;
        border: 1px solid #b8c4dc;
        border-radius: 4px;
        font-size: 12px; color: #1f1d1a;
        box-shadow: 0 4px 12px rgba(31, 29, 26, 0.12);
        opacity: 0; transform: translateY(8px);
        transition: opacity 160ms ease, transform 160ms ease;
        pointer-events: none; z-index: 100;
      }
      #toast.show { opacity: 1; transform: translateY(0); }
      #toast.error { border-color: #dc2626; }
      #toast.success { border-color: #16a34a; }
    </style>
  </head>
  <body>
    <main>
      <!-- TOP ROW -->
      <section class="top-row">
        <button class="unit-thumb" id="unit-thumb-button" type="button" title="Click to switch unit">
          <canvas id="unit-thumb-canvas" width="32" height="36"></canvas>
          <span class="unit-thumb-label" id="unit-thumb-label">—</span>
        </button>
        <div class="labeled-panel">
          <h2>Poses</h2>
          <div class="pose-strip" id="pose-strip"></div>
        </div>
      </section>

      <!-- UNIT PICKER POPOVER -->
      <div class="popover-backdrop" id="unit-picker-backdrop" hidden>
        <div class="unit-picker" id="unit-picker">
          <h2>Select Unit</h2>
          <div class="unit-picker-grid" id="unit-picker-grid"></div>
        </div>
      </div>

      <!-- MIDDLE ROW: editing grid (facing/weapon source + per-row preview) | composite | palette -->
      <section class="middle-row">
        <div class="editing-grid">
          <div class="labeled-panel combined-panel">
            <h2>Facing</h2>
            <div class="combined-row">
              <div class="facing-grid small" id="facing-picker-grid">
                <button class="facing-cell" type="button" data-facing="NW"><canvas width="32" height="36"></canvas><span class="label">NW</span></button>
                <button class="facing-cell" type="button" data-facing="N"><canvas width="32" height="36"></canvas><span class="label">N</span></button>
                <button class="facing-cell" type="button" data-facing="NE"><canvas width="32" height="36"></canvas><span class="label">NE</span></button>
                <button class="facing-cell" type="button" data-facing="W"><canvas width="32" height="36"></canvas><span class="label">W</span></button>
                <div class="facing-cell-empty"></div>
                <button class="facing-cell" type="button" data-facing="E"><canvas width="32" height="36"></canvas><span class="label">E</span></button>
                <button class="facing-cell" type="button" data-facing="SW"><canvas width="32" height="36"></canvas><span class="label">SW</span></button>
                <button class="facing-cell" type="button" data-facing="S"><canvas width="32" height="36"></canvas><span class="label">S</span></button>
                <button class="facing-cell" type="button" data-facing="SE"><canvas width="32" height="36"></canvas><span class="label">SE</span></button>
              </div>
              <div class="combined-preview-wrap">
                <span class="combined-preview-label">Selected</span>
                <div class="preview-wrap small">
                  <canvas id="facing-preview-canvas" width="32" height="36"></canvas>
                  <div class="pixel-hover" id="facing-pixel-hover" hidden></div>
                </div>
              </div>
            </div>
          </div>

          <div class="labeled-panel combined-panel">
            <h2>Weapon Source</h2>
            <div class="combined-row">
              <div id="weapon-source-grid">
                <button class="weapon-source-cell" type="button" data-facing="NW"><canvas width="32" height="32"></canvas><span class="label">NW</span></button>
                <button class="weapon-source-cell" type="button" data-facing="N"><canvas width="32" height="32"></canvas><span class="label">N</span></button>
                <button class="weapon-source-cell" type="button" data-facing="NE"><canvas width="32" height="32"></canvas><span class="label">NE</span></button>
                <button class="weapon-source-cell" type="button" data-facing="W"><canvas width="32" height="32"></canvas><span class="label">W</span></button>
                <div class="weapon-source-cell-empty"></div>
                <button class="weapon-source-cell" type="button" data-facing="E"><canvas width="32" height="32"></canvas><span class="label">E</span></button>
                <button class="weapon-source-cell" type="button" data-facing="SW"><canvas width="32" height="32"></canvas><span class="label">SW</span></button>
                <button class="weapon-source-cell" type="button" data-facing="S"><canvas width="32" height="32"></canvas><span class="label">S</span></button>
                <button class="weapon-source-cell" type="button" data-facing="SE"><canvas width="32" height="32"></canvas><span class="label">SE</span></button>
              </div>
              <div class="combined-preview-wrap">
                <span class="combined-preview-label">Selected</span>
                <div class="preview-wrap small">
                  <canvas id="weapon-source-preview-canvas" width="32" height="32"></canvas>
                  <div class="pixel-hover" id="weapon-pixel-hover" hidden></div>
                </div>
              </div>
            </div>
          </div>
        </div>

        <div class="labeled-panel composite-column">
          <button id="btn-save-variant" class="save-variant-button" type="button">
            <span>Save Variant</span>
            <span class="hotkey-hint">S</span>
          </button>
          <h2>Composite</h2>
          <div class="preview-wrap composite">
            <canvas id="composite-preview-canvas" width="32" height="36"></canvas>
          </div>
          <div class="weapon-edit-panel" id="weapon-edit-strip">
            <h2>Layer Tools</h2>
            <div class="weapon-edit-row">
              <canvas id="weapon-edit-thumb" width="32" height="32"></canvas>
              <div id="weapon-edit-stats">
                <div><span class="stat-key">x:</span> <span id="stat-x">—</span></div>
                <div><span class="stat-key">y:</span> <span id="stat-y">—</span></div>
                <div><span class="stat-key">rot:</span> <span id="stat-rot">—</span></div>
                <div><span class="stat-key">flipX:</span> <span id="stat-flipx">—</span></div>
              </div>
            </div>
            <div class="button-row">
              <button id="btn-mirror" type="button">Mirror</button>
              <button id="btn-rotate" type="button">Rotate 90&deg;</button>
              <button id="btn-delete-variant" type="button">Delete</button>
            </div>
            <div id="weapon-edit-help">
              Arrow keys: nudge 1px &middot; Shift+Arrow: nudge 8px
            </div>
          </div>
        </div>

        <div class="paint-tools-panel" id="paint-tools-panel">
          <h2>Layers</h2>
          <div class="paint-layer-list" id="paint-layer-list"></div>
          <h2>Palette</h2>
          <div class="palette-rows">
            <div class="palette-row" id="palette-row-primary">
              <span class="palette-row-label">Primary <em>(coat)</em></span>
              <div class="palette-row-swatches"></div>
            </div>
            <div class="palette-row" id="palette-row-secondary">
              <span class="palette-row-label">Secondary <em>(trousers)</em></span>
              <div class="palette-row-swatches"></div>
            </div>
            <div class="palette-row" id="palette-row-tertiary">
              <span class="palette-row-label">Tertiary <em>(hats / boots)</em></span>
              <div class="palette-row-swatches"></div>
            </div>
          </div>
          <h2 class="palette-materials-heading">Materials</h2>
          <div class="palette-rows" id="palette-materials"></div>
          <label class="paint-color-row">
            Custom
            <input type="color" id="paint-color-input" value="#cc3333">
          </label>
          <div class="paint-mode-row">
            <label><input type="radio" name="paint-mode" value="brush" checked> Brush</label>
            <label><input type="radio" name="paint-mode" value="erase"> Erase</label>
          </div>
          <button id="btn-save-edits" class="primary" type="button">Save Edits</button>
        </div>
      </section>

      <!-- BOTTOM: variants strip -->
      <section class="bottom-row">
        <div class="labeled-panel variants-panel">
          <h2>Variants</h2>
          <div class="variants-strip" id="variants-strip"></div>
        </div>
      </section>

      <!-- Hidden legacy save-kit button: still wired to the save-kit handler so existing logic keeps working. -->
      <button id="btn-save-kit" type="button" hidden></button>

      <div class="info-card" id="info-card"></div>

      <details class="advanced-drawer" id="advanced-drawer">
        <summary>⚙ Advanced</summary>
        <div class="advanced-body">
          <label>Facing <select id="facing-select"></select></label>
          <label>Kit <select id="kit-select"></select></label>
          <label>Pose <select id="pose-select">
            <option value="idle" selected>idle</option>
            <option value="walking">walking</option>
            <option value="running">running</option>
            <option value="make-ready">make-ready</option>
            <option value="present">present</option>
            <option value="fire">fire</option>
            <option value="hit">hit</option>
            <option value="dying">dying</option>
          </select></label>
          <label>Regiment <select id="regiment-select"></select></label>
          <button class="reset" id="reset-button">Reset to Kit</button>
          <div id="component-groups"></div>
        </div>
      </details>
    </main>
    <div id="toast"></div>
    <script type="module" src="/src/dev/component-preview.ts"></script>
  </body>
</html>
