<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Austerbitz — Soldier Component Preview</title>
    <style>
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: #0f1115;
        color: #f3f4f6;
      }
      main {
        display: grid;
        grid-template-columns: minmax(260px, 320px) 1fr;
        height: 100vh;
      }
      aside {
        padding: 16px;
        border-right: 1px solid rgba(255, 255, 255, 0.06);
        background: rgba(21, 24, 30, 0.9);
        overflow-y: auto;
      }
      aside h1 {
        margin: 0 0 12px;
        font-size: 16px;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }
      aside h2 {
        margin: 18px 0 8px;
        font-size: 13px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: #9ca3af;
      }
      aside label {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 13px;
        margin-bottom: 6px;
        cursor: pointer;
      }
      select {
        width: 100%;
        padding: 6px 8px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 4px;
        background: rgba(12, 15, 20, 0.9);
        color: inherit;
        font-size: 13px;
        margin-bottom: 12px;
      }
      button.reset {
        margin-top: 10px;
        width: 100%;
        padding: 6px 10px;
        background: rgba(56, 76, 110, 0.45);
        border: 1px solid rgba(113, 153, 204, 0.6);
        color: inherit;
        border-radius: 4px;
        cursor: pointer;
      }
      button.reset:hover { background: rgba(73, 104, 150, 0.55); }

      section.preview {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 24px;
        padding: 24px;
        position: relative;
      }
      canvas#preview-canvas {
        width: 256px;
        height: 288px;
        image-rendering: pixelated;
        border: 1px solid rgba(255, 255, 255, 0.08);
        background: rgba(12, 15, 20, 1);
      }
      .facing-grid {
        display: grid;
        grid-template-columns: repeat(3, 96px);
        grid-template-rows: repeat(3, 108px);
        gap: 6px;
      }
      .facing-cell {
        position: relative;
        width: 96px;
        height: 108px;
        padding: 0;
        background: rgba(12, 15, 20, 1);
        border: 2px solid rgba(255, 255, 255, 0.08);
        border-radius: 4px;
        cursor: pointer;
        overflow: hidden;
      }
      .facing-cell:hover { border-color: rgba(147, 197, 253, 0.55); }
      .facing-cell.active {
        border-color: #3b82f6;
        box-shadow: 0 0 0 1px #3b82f6;
      }
      .facing-cell canvas {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        image-rendering: pixelated;
        pointer-events: none;
      }
      .facing-cell .label {
        position: absolute;
        top: 3px;
        left: 5px;
        font-size: 10px;
        font-family: ui-monospace, Menlo, monospace;
        color: rgba(243, 244, 246, 0.85);
        background: rgba(12, 15, 20, 0.65);
        padding: 1px 4px;
        border-radius: 2px;
        pointer-events: none;
      }
      .facing-cell-empty {
        width: 96px;
        height: 108px;
      }
      .info-card {
        position: absolute;
        bottom: 24px;
        left: 24px;
        padding: 10px 12px;
        background: rgba(17, 24, 39, 0.85);
        border: 1px solid rgba(59, 130, 246, 0.4);
        border-radius: 6px;
        font-size: 12px;
        line-height: 1.4;
      }
      .info-card strong { color: #93c5fd; font-weight: 600; }
    </style>
  </head>
  <body>
    <main>
      <aside>
        <h1>Soldier Components</h1>
        <label>
          Facing
          <select id="facing-select"></select>
        </label>
        <label>
          Kit
          <select id="kit-select"></select>
        </label>
        <label>
          Regiment
          <select id="regiment-select"></select>
        </label>
        <label>
          Skeleton Overlay
          <select id="skeleton-select">
            <option value="none">None</option>
            <option value="front">Front</option>
            <option value="side">Side</option>
            <option value="back">Back</option>
          </select>
        </label>
        <button class="reset" id="reset-button">Reset to Kit</button>
        <div id="component-groups"></div>
      </aside>
      <section class="preview">
        <canvas id="preview-canvas" width="32" height="36"></canvas>
        <div class="facing-grid" id="facing-grid">
          <button class="facing-cell" type="button" data-facing="NW"><canvas width="32" height="36"></canvas><span class="label">NW</span></button>
          <button class="facing-cell" type="button" data-facing="N"><canvas width="32" height="36"></canvas><span class="label">N</span></button>
          <button class="facing-cell" type="button" data-facing="NE"><canvas width="32" height="36"></canvas><span class="label">NE</span></button>
          <button class="facing-cell" type="button" data-facing="W"><canvas width="32" height="36"></canvas><span class="label">W</span></button>
          <div class="facing-cell-empty"></div>
          <button class="facing-cell" type="button" data-facing="E"><canvas width="32" height="36"></canvas><span class="label">E</span></button>
          <button class="facing-cell" type="button" data-facing="SW"><canvas width="32" height="36"></canvas><span class="label">SW</span></button>
          <button class="facing-cell" type="button" data-facing="S"><canvas width="32" height="36"></canvas><span class="label">S</span></button>
          <button class="facing-cell" type="button" data-facing="SE"><canvas width="32" height="36"></canvas><span class="label">SE</span></button>
        </div>
        <div class="info-card" id="info-card"></div>
      </section>
    </main>
    <script type="module" src="/src/dev/component-preview.ts"></script>
  </body>
</html>
