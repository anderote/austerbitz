<!doctype html>
<html lang='en'>
  <head>
    <meta charset='utf-8'>
    <title>Soldier Component Gallery</title>
    <style>
      :root {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: #d1d5db;
        color: #111827;
      }
      body { margin: 0; padding: 32px; line-height: 1.6; background: #d1d5db; }
      h1 { margin-top: 0; letter-spacing: 0.08em; text-transform: uppercase; font-size: 20px; color: #1f2937; }
      h2 { margin-top: 40px; font-size: 14px; text-transform: uppercase; letter-spacing: 0.06em; color: #4b5563; }
      p.note { max-width: 680px; margin-bottom: 20px; color: #6b7280; font-size: 14px; }
      section { margin-bottom: 40px; }
      figure { margin: 0; display: flex; flex-direction: column; align-items: center; gap: 8px; font-size: 12px; color: #374151; }
      figure img { image-rendering: pixelated; display: block; }
      .frame { padding: 12px; background: #ffffff; border: 1px solid rgba(55, 65, 81, 0.2); border-radius: 8px; box-shadow: 0 4px 14px rgba(15, 23, 42, 0.08); }
      .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 20px; align-items: start; }
      figcaption { text-align: center; word-break: break-all; }
    </style>
  </head>
  <body>
    <h1>Soldier Component Gallery</h1>
    <p class='note'>Open this file directly in a browser — no build or dev server required. The images are the latest outputs generated in <code>public/sprites/</code>.</p>
    <section><h2>Composite Preview</h2><figure><img src='sprites/british-line-infantry-components-preview.png' alt='Composite preview' /><figcaption>british-line-infantry-components-preview.png</figcaption></figure></section><section><h2>Composite Atlas</h2><figure><img src='sprites/british-line-infantry-components.png' alt='Composite atlas' /><figcaption>british-line-infantry-components.png</figcaption></figure></section><section><h2>Component Layers</h2><div class='grid'><figure><div class='frame'><img src='sprites/components/anatomy/body/front/base.png' alt='sprites/components/anatomy/body/front/base.png' /></div><figcaption>sprites/components/anatomy/body/front/base.png</figcaption></figure><figure><div class='frame'><img src='sprites/components/anatomy/head/front/default.png' alt='sprites/components/anatomy/head/front/default.png' /></div><figcaption>sprites/components/anatomy/head/front/default.png</figcaption></figure><figure><div class='frame'><img src='sprites/components/anatomy/legs/front/idle.png' alt='sprites/components/anatomy/legs/front/idle.png' /></div><figcaption>sprites/components/anatomy/legs/front/idle.png</figcaption></figure><figure><div class='frame'><img src='sprites/components/anatomy/torso/front/slim.png' alt='sprites/components/anatomy/torso/front/slim.png' /></div><figcaption>sprites/components/anatomy/torso/front/slim.png</figcaption></figure><figure><div class='frame'><img src='sprites/components/shadow/front/default.png' alt='sprites/components/shadow/front/default.png' /></div><figcaption>sprites/components/shadow/front/default.png</figcaption></figure><figure><div class='frame'><img src='sprites/components/uniform/coat-line/front/base.png' alt='sprites/components/uniform/coat-line/front/base.png' /></div><figcaption>sprites/components/uniform/coat-line/front/base.png</figcaption></figure><figure><div class='frame'><img src='sprites/components/uniform/head/shako-standard.png' alt='sprites/components/uniform/head/shako-standard.png' /></div><figcaption>sprites/components/uniform/head/shako-standard.png</figcaption></figure><figure><div class='frame'><img src='sprites/components/uniform/lower/trousers-front.png' alt='sprites/components/uniform/lower/trousers-front.png' /></div><figcaption>sprites/components/uniform/lower/trousers-front.png</figcaption></figure><figure><div class='frame'><img src='sprites/components/weapon/musket/front/idle.png' alt='sprites/components/weapon/musket/front/idle.png' /></div><figcaption>sprites/components/weapon/musket/front/idle.png</figcaption></figure></div></section>
  </body>
</html>
