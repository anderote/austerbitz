<!doctype html>
<html lang='en'>
  <head>
    <meta charset='utf-8'>
    <title>Soldier Component Gallery</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: #0f1115;
        color: #e5e7eb;
      }
      body { margin: 0; padding: 24px; line-height: 1.5; }
      h1 { margin-top: 0; letter-spacing: 0.08em; text-transform: uppercase; font-size: 18px; }
      h2 { margin-top: 32px; font-size: 14px; text-transform: uppercase; letter-spacing: 0.05em; color: #93c5fd; }
      p.note { max-width: 640px; margin-bottom: 16px; color: #a5b4fc; }
      section { margin-bottom: 32px; }
      figure { margin: 12px; text-align: center; }
      figure img { image-rendering: pixelated; border: 1px solid rgba(148, 163, 184, 0.4); background: rgba(15, 18, 24, 0.9); padding: 8px; }
      .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 8px; }
      .grid figure { margin: 0; }
      figcaption { margin-top: 6px; font-size: 12px; color: rgba(203, 213, 225, 0.8); word-break: break-all; }
    </style>
  </head>
  <body>
    <h1>Soldier Component Gallery</h1>
    <p class='note'>Open this file directly in a browser — no build or dev server required. The images are the latest outputs generated in <code>public/sprites/</code>.</p>
    <section><h2>Composite Preview</h2><figure><img src='sprites/british-line-infantry-components-preview.png' alt='Composite preview' /><figcaption>british-line-infantry-components-preview.png</figcaption></figure></section><section><h2>Composite Atlas</h2><figure><img src='sprites/british-line-infantry-components.png' alt='Composite atlas' /><figcaption>british-line-infantry-components.png</figcaption></figure></section><section><h2>Component Layers</h2><div class='grid'><figure><img src='sprites/components/anatomy/body/front/base.png' alt='sprites/components/anatomy/body/front/base.png' /><figcaption>sprites/components/anatomy/body/front/base.png</figcaption></figure><figure><img src='sprites/components/anatomy/head/front/default.png' alt='sprites/components/anatomy/head/front/default.png' /><figcaption>sprites/components/anatomy/head/front/default.png</figcaption></figure><figure><img src='sprites/components/anatomy/legs/front/idle.png' alt='sprites/components/anatomy/legs/front/idle.png' /><figcaption>sprites/components/anatomy/legs/front/idle.png</figcaption></figure><figure><img src='sprites/components/anatomy/torso/front/slim.png' alt='sprites/components/anatomy/torso/front/slim.png' /><figcaption>sprites/components/anatomy/torso/front/slim.png</figcaption></figure><figure><img src='sprites/components/shadow/front/default.png' alt='sprites/components/shadow/front/default.png' /><figcaption>sprites/components/shadow/front/default.png</figcaption></figure><figure><img src='sprites/components/uniform/coat-line/front/base.png' alt='sprites/components/uniform/coat-line/front/base.png' /><figcaption>sprites/components/uniform/coat-line/front/base.png</figcaption></figure><figure><img src='sprites/components/uniform/head/shako-standard.png' alt='sprites/components/uniform/head/shako-standard.png' /><figcaption>sprites/components/uniform/head/shako-standard.png</figcaption></figure><figure><img src='sprites/components/uniform/lower/trousers-front.png' alt='sprites/components/uniform/lower/trousers-front.png' /><figcaption>sprites/components/uniform/lower/trousers-front.png</figcaption></figure><figure><img src='sprites/components/weapon/musket/front/idle.png' alt='sprites/components/weapon/musket/front/idle.png' /><figcaption>sprites/components/weapon/musket/front/idle.png</figcaption></figure></div></section>
  </body>
</html>
